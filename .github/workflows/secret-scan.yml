# =============================================================================
# Scan de secrets — AssistantAudit-Agent
# Detecte les secrets exposes dans le code via trufflehog.
# Aligne sur le workflow du repo backend.
# =============================================================================

name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Scan secrets (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source (historique complet)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scanner les secrets avec trufflehog
        uses: trufflesecurity/trufflehog@6bd2d14f7a4bc1e569fa3550efa7ec632a4fa67b # v3.94.2
        with:
          extra_args: --results=verified,unknown
